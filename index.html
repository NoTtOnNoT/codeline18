<!DOCTYPE html>
<html lang="th">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Student Portal | ระบบนักเรียน (พี่รหัส)</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
            rel="stylesheet">
        <link
            href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap"
            rel="stylesheet">
        <link rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>

        <div class="background-overlay"></div>

        <div
            class="container d-flex align-items-center justify-content-center min-vh-100">

            <section id="login-section"
                class="col-12 col-sm-8 col-md-5 col-lg-4">
                <div class="glass-card p-4 p-md-5 text-center fade-in">
                    <div class="icon-circle mb-4">
                        <i class="fas fa-user-grad fa-2x"></i>
                    </div>
                    <h2 class="fw-bold mb-2">สวัสดีพี่รหัส</h2>
                    <p
                        class="text-secondary mb-4">กรุณากรอกรหัสนักเรียนเพื่อเข้าสู่ระบบ</p>
                    <div class="form-floating mb-3">
                        <input type="text" id="student-id" class="form-control"
                            placeholder="รหัสนักเรียน">
                        <label for="student-id">รหัสนักเรียน</label>
                    </div>
                    <button id="btn-login"
                        class="btn btn-primary w-100 py-3 shadow-lg">
                        เข้าสู่ระบบ <i class="fas fa-arrow-right ms-2"></i>
                    </button>
                </div>
            </section>

            <section id="view-section" class="col-12 col-md-6 col-lg-5 d-none">
                <div class="glass-card p-4 text-center fade-in">
                    <div class="profile-wrapper mb-4">
                        <img id="view-photo"
                            src="https://ui-avatars.com/api/?background=random&color=fff&name=Senior"
                            alt="Profile" class="profile-img shadow">
                    </div>
                    <h2 id="view-name"
                        class="fw-bold text-dark mb-1">ชื่อ-นามสกุล</h2>
                    <span
                        class="badge rounded-pill bg-light text-dark mb-4 px-3 py-2 border">ID:
                        <span id="view-id"></span></span>

                    <div class="row g-3 mb-4 text-start">
                        <div class="col-12">
                            <div class="info-card p-3 text-center">
                                <small class="text-muted d-block">ฉายานามสมมุติ
                                    (น้องรหัสจะเห็นชื่อนี้)</small>
                                <span id="text-alias"
                                    class="fw-bold fs-5 text-primary">ยังไม่ได้ตั้งฉายา</span>
                            </div>
                        </div>
                        <div class="col-12 text-center">
                            <div class="info-card p-3">
                                <small
                                    class="text-muted d-block mb-2">ช่องทางติดต่อที่คุณลงไว้</small>
                                <div
                                    class="d-flex justify-content-center gap-4">
                                    <span id="view-fb-status"
                                        class="text-secondary opacity-50"><i
                                            class="fab fa-facebook fa-2x"></i></span>
                                    <span id="view-ig-status"
                                        class="text-secondary opacity-50"><i
                                            class="fab fa-instagram fa-2x"></i></span>
                                </div>
                                <small id="text-contact-status"
                                    class="text-muted mt-2 d-block">ยังไม่มีข้อมูลการติดต่อ</small>
                            </div>
                        </div>
                    </div>

                    <div class="d-grid gap-3">
                        <button id="btn-go-to-edit"
                            class="btn btn-warning btn-action py-3 fw-bold">
                            <i class="fas fa-edit me-2"></i>
                            แก้ไขข้อมูลฉายา/ช่องทางติดต่อ
                        </button>
                        <button onclick="location.reload()"
                            class="btn btn-link text-muted btn-sm">ออกจากระบบ</button>
                    </div>
                </div>
            </section>

            <section id="edit-section" class="col-12 col-md-6 col-lg-5 d-none">
                <div class="glass-card p-4 fade-in">
                    <h4 class="fw-bold mb-4"><i
                            class="fas fa-user-edit me-2"></i>อัปเดตข้อมูลสายรหัส</h4>

                    <div class="mb-3">
                        <label
                            class="form-label small fw-bold text-primary">ฉายานามสมมุติ
                            (Alias)</label>
                        <input type="text" id="input-alias"
                            class="form-control form-control-lg"
                            placeholder="เช่น พี่กุ้งเต้นซิ่ง">
                        <div
                            class="form-text">ชื่อนี้จะโชว์ให้น้องรหัสเห็นแทนชื่อจริง</div>
                    </div>

                    <hr class="my-4">

                    <div class="mb-3">
                        <label class="form-label small fw-bold text-info"><i
                                class="fab fa-facebook-f me-2"></i>Facebook
                            Link</label>
                        <input type="url" id="input-fb" class="form-control"
                            placeholder="https://www.facebook.com/yourname">
                    </div>

                    <div class="mb-4">
                        <label class="form-label small fw-bold text-danger"><i
                                class="fab fa-instagram me-2"></i>Instagram
                            Link</label>
                        <input type="url" id="input-ig" class="form-control"
                            placeholder="https://www.instagram.com/yourname">
                    </div>

                    <div class="row g-2">
                        <div class="col-8">
                            <button id="btn-save"
                                class="btn btn-success w-100 py-3 fw-bold shadow-sm">
                                <i class="fas fa-save me-2"></i> บันทึกข้อมูล
                            </button>
                        </div>
                        <div class="col-4">
                            <button id="btn-cancel"
                                class="btn btn-light w-100 py-3 border">ยกเลิก</button>
                        </div>
                    </div>
                </div>
            </section>

        </div>

        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <script type="module" src="script.js"></script>
    </body>
</html>
